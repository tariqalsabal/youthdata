<div id="nl-admin" dir="rtl">
  <div class="nl-head"><h2>إدارة النشرة البريدية</h2></div>

  <div id="nl-kpis" class="nl-kpis"></div>

  <div class="nl-tabs">
    <button class="nl-tab active" data-tab="subs">المشتركون</button>
    <button class="nl-tab" data-tab="camp">النشرات والإرسال</button>
  </div>

  <!-- المشتركون -->
  <div id="tab-subs" class="nl-pane">
    <div class="nl-toolbar">
      <input id="nl-search" type="text" placeholder="بحث بالبريد أو الاسم…">
      <select id="nl-filter">
        <option value="all">كل الحالات</option>
        <option value="active">نشط</option>
        <option value="unsubscribed">ملغى</option>
      </select>
      <input id="nl-newemail" type="email" placeholder="إضافة بريد…">
      <button id="nl-add" class="nl-btn">إضافة</button>
    </div>
    <div class="nl-tablewrap">
      <table class="nl-table">
        <thead><tr><th>#</th><th>البريد</th><th>الاسم</th><th>الحالة</th><th>المصدر</th><th>مسجّل</th><th>التاريخ</th><th>إجراء</th></tr></thead>
        <tbody id="nl-subs"></tbody>
      </table>
    </div>
  </div>

  <!-- النشرات -->
  <div id="tab-camp" class="nl-pane" style="display:none">
    <div class="nl-compose">
      <h3>إنشاء نشرة جديدة</h3>
      <input id="nl-subject" type="text" placeholder="عنوان النشرة">
      <textarea id="nl-bodyhtml" rows="8" placeholder="محتوى النشرة (HTML مسموح)"></textarea>
      <div><button id="nl-save" class="nl-btn">حفظ كمسودة</button></div>
    </div>
    <div class="nl-tablewrap">
      <table class="nl-table">
        <thead><tr><th>#</th><th>العنوان</th><th>الحالة</th><th>المستهدفون</th><th>أُرسل</th><th>فشل</th><th>أُنشئت</th><th>إجراء</th></tr></thead>
        <tbody id="nl-camps"></tbody>
      </table>
    </div>
  </div>

  <div id="nl-toast" class="nl-toast"></div>
</div>

<style>
#nl-admin{font-family:'IBM Plex Sans Arabic','Segoe UI',Tahoma,sans-serif;color:#1e2a52;padding:4px}
#nl-admin .nl-head h2{font-size:20px;font-weight:800;margin:0 0 16px}
#nl-admin .nl-kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:18px}
#nl-admin .kpi{background:#fff;border:1px solid #e6e9f0;border-radius:14px;padding:12px 14px}
#nl-admin .kpi .v{font-size:24px;font-weight:800}#nl-admin .kpi .t{font-size:12px;color:#64748b;margin-top:2px}
#nl-admin .kpi.g .v{color:#b2977b}
#nl-admin .nl-tabs{display:flex;gap:8px;margin-bottom:14px}
#nl-admin .nl-tab{background:#eef1f8;border:0;border-radius:10px;padding:8px 18px;font-weight:600;cursor:pointer;color:#334155}
#nl-admin .nl-tab.active{background:#1e2a52;color:#fff}
#nl-admin .nl-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
#nl-admin input,#nl-admin select,#nl-admin textarea{border:1px solid #cbd5e1;border-radius:10px;padding:8px 12px;font:inherit;outline:none}
#nl-admin input:focus,#nl-admin textarea:focus{border-color:#1e2a52}
#nl-admin #nl-search{flex:1;min-width:180px}
#nl-admin .nl-btn{background:#1e2a52;color:#fff;border:0;border-radius:10px;padding:8px 16px;font-weight:600;cursor:pointer}
#nl-admin .nl-btn:hover{background:#28376a}
#nl-admin .nl-btn.gold{background:#c3a98f}#nl-admin .nl-btn.gold:hover{background:#b2977b}
#nl-admin .nl-btn.danger{background:#fee2e2;color:#b91c1c}
#nl-admin .nl-btn.mini{padding:4px 10px;font-size:12px;margin-inline-start:4px}
#nl-admin .nl-tablewrap{overflow-x:auto;border:1px solid #e6e9f0;border-radius:12px;background:#fff}
#nl-admin .nl-table{width:100%;border-collapse:collapse;font-size:13px}
#nl-admin .nl-table th,#nl-admin .nl-table td{padding:10px 12px;text-align:right;border-bottom:1px solid #f1f5f9;white-space:nowrap}
#nl-admin .nl-table th{background:#f8fafc;font-weight:700;color:#475569}
#nl-admin .badge{padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700}
#nl-admin .badge.active{background:#dcfce7;color:#166534}#nl-admin .badge.unsubscribed{background:#fee2e2;color:#991b1b}
#nl-admin .badge.draft{background:#e2e8f0;color:#475569}#nl-admin .badge.sent{background:#dbeafe;color:#1e40af}
#nl-admin .nl-compose{background:#fff;border:1px solid #e6e9f0;border-radius:14px;padding:16px;margin-bottom:16px;display:flex;flex-direction:column;gap:10px}
#nl-admin .nl-compose h3{margin:0;font-size:15px}
#nl-admin .nl-toast{position:fixed;bottom:20px;inset-inline-start:20px;background:#1e2a52;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:9999}
#nl-admin .nl-toast.show{opacity:1}
</style>

<script>
(function(){
  function toast(m){var t=document.getElementById("nl-toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}
  function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function p(data){
    return new Promise(function(res,rej){
      apex.server.process("NL_ADMIN", data, {dataType:"json", success:res, error:rej});
    });
  }

  function loadStats(){
    p({x01:"stats"}).then(function(d){
      var K=[["total","إجمالي المشتركين",1],["active","نشطون",0],["unsubscribed","ملغون",0],
             ["today","اشتراكات اليوم",0],["week","آخر 7 أيام",0],["month","هذا الشهر",0],
             ["registered","مستخدمون مسجّلون",0],["campaigns","النشرات",1],["sent","نشرات مُرسلة",0]];
      document.getElementById("nl-kpis").innerHTML = K.map(function(o){
        return '<div class="kpi'+(o[2]?' g':'')+'"><div class="v">'+((d[o[0]]||0).toLocaleString("en-US"))+'</div><div class="t">'+o[1]+'</div></div>';
      }).join("");
    });
  }

  function loadSubs(){
    var q=document.getElementById("nl-search").value;
    var f=document.getElementById("nl-filter").value;
    p({x01:"list",x02:q,x03:f}).then(function(d){
      var rows=(d.rows||[]).map(function(r){
        var act = r.status==="active"
          ? '<button class="nl-btn mini danger" data-a="unsub" data-id="'+r.id+'">إلغاء</button>'
          : '<button class="nl-btn mini" data-a="act" data-id="'+r.id+'">تفعيل</button>';
        act += '<button class="nl-btn mini danger" data-a="del" data-id="'+r.id+'">حذف</button>';
        return '<tr><td>'+r.id+'</td><td>'+esc(r.email)+'</td><td>'+esc(r.name||"—")+'</td>'
          +'<td><span class="badge '+r.status+'">'+(r.status==="active"?"نشط":"ملغى")+'</span></td>'
          +'<td>'+esc(r.source)+'</td><td>'+(r.registered?"✓":"—")+'</td><td>'+esc(r.at)+'</td><td>'+act+'</td></tr>';
      }).join("");
      document.getElementById("nl-subs").innerHTML = rows || '<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:20px">لا نتائج</td></tr>';
    });
  }

  function loadCamps(){
    p({x01:"campaigns"}).then(function(d){
      var rows=(d.rows||[]).map(function(r){
        var send = r.status==="draft"
          ? '<button class="nl-btn mini gold" data-a="send" data-id="'+r.id+'">إرسال</button>' : '—';
        return '<tr><td>'+r.id+'</td><td>'+esc(r.subject)+'</td>'
          +'<td><span class="badge '+r.status+'">'+(r.status==="sent"?"مُرسلة":"مسودة")+'</span></td>'
          +'<td>'+r.recipients+'</td><td>'+r.sent+'</td><td>'+r.fail+'</td><td>'+esc(r.created)+'</td><td>'+send+'</td></tr>';
      }).join("");
      document.getElementById("nl-camps").innerHTML = rows || '<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:20px">لا نشرات</td></tr>';
    });
  }

  function boot(){
    // تبويبات
    document.querySelectorAll("#nl-admin .nl-tab").forEach(function(b){
      b.addEventListener("click",function(){
        document.querySelectorAll("#nl-admin .nl-tab").forEach(function(x){x.classList.remove("active");});
        b.classList.add("active");
        document.getElementById("tab-subs").style.display = b.dataset.tab==="subs"?"":"none";
        document.getElementById("tab-camp").style.display = b.dataset.tab==="camp"?"":"none";
        if(b.dataset.tab==="camp") loadCamps();
      });
    });

    document.getElementById("nl-search").addEventListener("input", function(){clearTimeout(window._nlt);window._nlt=setTimeout(loadSubs,400);});
    document.getElementById("nl-filter").addEventListener("change", loadSubs);

    document.getElementById("nl-add").addEventListener("click", function(){
      var em=document.getElementById("nl-newemail").value;
      if(!em){return;}
      p({x01:"add",x02:em}).then(function(r){ if(r.success){document.getElementById("nl-newemail").value="";toast("تمت الإضافة");loadSubs();loadStats();}else{toast(r.error||"خطأ");} });
    });

    // إجراءات جدول المشتركين (تفويض)
    document.getElementById("nl-subs").addEventListener("click", function(e){
      var b=e.target.closest("button"); if(!b) return;
      var id=b.dataset.id, a=b.dataset.a;
      if(a==="del"){ if(!confirm("حذف هذا المشترك نهائياً؟")) return; p({x01:"delete",x02:id}).then(function(){toast("تم الحذف");loadSubs();loadStats();}); }
      else if(a==="unsub"){ p({x01:"setstatus",x02:id,x03:"unsubscribed"}).then(function(){loadSubs();loadStats();}); }
      else if(a==="act"){ p({x01:"setstatus",x02:id,x03:"active"}).then(function(){loadSubs();loadStats();}); }
    });

    document.getElementById("nl-save").addEventListener("click", function(){
      var s=document.getElementById("nl-subject").value.trim();
      var b=document.getElementById("nl-bodyhtml").value;
      if(!s){toast("أدخل عنواناً");return;}
      p({x01:"savecampaign",x03:s,p_clob_01:b}).then(function(r){
        if(r.success){document.getElementById("nl-subject").value="";document.getElementById("nl-bodyhtml").value="";toast("تم حفظ المسودة");loadCamps();loadStats();}
      });
    });

    document.getElementById("nl-camps").addEventListener("click", function(e){
      var b=e.target.closest("button"); if(!b||b.dataset.a!=="send") return;
      if(!confirm("إرسال هذه النشرة لكل المشتركين النشطين؟")) return;
      b.disabled=true; b.textContent="جارٍ الإرسال…";
      p({x01:"send",x02:b.dataset.id}).then(function(r){
        if(r.success){toast("تم الإرسال");}else{toast("فشل: "+(r.error||""));}
        loadCamps();loadStats();
      }).catch(function(){toast("تعذّر الإرسال");b.disabled=false;b.textContent="إرسال";});
    });

    loadStats(); loadSubs();
  }

  if(window.apex && apex.jQuery){ apex.jQuery(function(){boot();}); }
  else { document.addEventListener("DOMContentLoaded", boot); }
})();
</script>
